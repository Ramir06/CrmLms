<div class="lec-detail-body">
    {% if material.body_html %}
    <div class="lecture-content-view">
        {{ material.body_html|safe }}
    </div>
    {% endif %}

    {% if material.file %}
    <div class="lecture-asset-box">
        <div class="lecture-asset-icon">
            <i class="bi bi-file-earmark-text"></i>
        </div>
        <div class="lecture-asset-info">
            <div class="lecture-asset-title">Прикреплённый файл</div>
            <div class="lecture-asset-name">{{ material.file.name }}</div>
        </div>
        <div class="lecture-asset-action">
            <a href="{{ material.file.url }}" class="btn btn-primary btn-sm" target="_blank">
                <i class="bi bi-download me-1"></i>Скачать
            </a>
        </div>
    </div>
    {% endif %}

    {% if material.video_url %}
    <div class="lecture-video-box">
        <div class="d-flex align-items-center justify-content-between">
            <h6 class="mb-0 fw-semibold">
                <i class="bi bi-play-circle me-2"></i>Видео
            </h6>
        </div>
        <div class="ratio ratio-16x9 overflow-hidden">
            <iframe src="{{ material.video_url }}" allowfullscreen></iframe>
        </div>
    </div>
    {% endif %}
</div>
