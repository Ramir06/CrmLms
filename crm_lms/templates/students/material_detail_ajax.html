<div class="lec-detail-card">
    <div class="lec-detail-hdr">
        <h5><i class="bi bi-book me-2"></i>{{ material.title }}</h5>
    </div>
    <div class="lec-detail-body">
        <div class="mb-3">
            <small class="text-muted">Глава: {{ material.section.title }}</small>
        </div>
        
        {% if material.body_html %}
        <div class="mb-4">
            {{ material.body_html|safe }}
        </div>
        {% endif %}
        
        {% if material.file %}
        <div class="mb-3">
            <h6><i class="bi bi-file-earmark me-2"></i>Файл</h6>
            <a href="{{ material.file.url }}" class="btn btn-sm btn-outline-primary" target="_blank">
                <i class="bi bi-download me-1"></i>Скачать {{ material.file.name }}
            </a>
        </div>
        {% endif %}
        
        {% if material.video_url %}
        <div class="mb-3">
            <h6><i class="bi bi-play-circle me-2"></i>Видео</h6>
            <div class="ratio ratio-16x9">
                <iframe src="{{ material.video_url }}" allowfullscreen></iframe>
            </div>
        </div>
        {% endif %}
    </div>
</div>
