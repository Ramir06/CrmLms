{% extends "base/admin_base.html" %}

{% block extra_css %}
<style>
/* Кодкойны стили */
.coin-positive {
    color: #28C76F;
    font-weight: 600;
}

.coin-negative {
    color: #EA5455;
    font-weight: 600;
}

.badge-pending {
    background-color: #FFC107;
    color: #000;
}

.badge-approved {
    background-color: #28C76F;
    color: #fff;
}

.badge-rejected {
    background-color: #EA5455;
    color: #fff;
}

.coin-card {
    background: linear-gradient(135deg, #7367F0, #9f7aea);
    color: white;
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1rem;
}

.coin-balance {
    font-size: 2.5rem;
    font-weight: 700;
    margin: 0.5rem 0;
}

.transaction-item {
    border-left: 3px solid transparent;
    padding: 0.75rem;
    margin-bottom: 0.5rem;
    border-radius: 0 8px 8px 0;
    transition: all 0.3s ease;
}

.transaction-item:hover {
    background-color: #f8f8f8;
}

.transaction-income {
    border-left-color: #28C76F;
}

.transaction-expense {
    border-left-color: #EA5455;
}

.withdrawal-card {
    border-left: 4px solid #7367F0;
    padding: 1rem;
    margin-bottom: 1rem;
    border-radius: 0 8px 8px 0;
    background: #f8f8f8;
}

.scale-item {
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 0.5rem;
    transition: all 0.3s ease;
}

.scale-item:hover {
    border-color: #7367F0;
    box-shadow: 0 2px 8px rgba(115, 103, 240, 0.1);
}

.batch-item {
    background: #f8f9fa;
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 1rem;
}

.mass-accrual-table {
    border-collapse: separate;
    border-spacing: 0;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    overflow: hidden;
}

.mass-accrual-table th,
.mass-accrual-table td {
    border: 1px solid #e0e0e0;
    padding: 0.5rem;
    text-align: center;
}

.mass-accrual-table th {
    background: #f8f9fa;
    font-weight: 600;
}

.mass-accrual-table .student-name {
    text-align: left;
    font-weight: 500;
}

.mass-accrual-table input[type="checkbox"] {
    transform: scale(1.2);
}

.mass-accrual-table input[type="checkbox"]:checked {
    background-color: #7367F0;
}

.btn-coin {
    background: linear-gradient(135deg, #7367F0, #9f7aea);
    color: white;
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    transition: all 0.3s ease;
}

.btn-coin:hover {
    background: linear-gradient(135deg, #6458f0, #8e7be8);
    color: white;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(115, 103, 240, 0.3);
}

.stats-card {
    background: white;
    border-radius: 12px;
    padding: 1.5rem;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    margin-bottom: 1rem;
    transition: all 0.3s ease;
}

.stats-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
}

.stats-number {
    font-size: 2rem;
    font-weight: 700;
    color: #7367F0;
}

.stats-label {
    color: #6E6B7B;
    font-size: 0.9rem;
    margin-top: 0.5rem;
}
</style>
{% endblock %}
