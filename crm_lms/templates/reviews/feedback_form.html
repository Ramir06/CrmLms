{% load i18n %}<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отзыв об уроке — ОкууTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
    body{font-family:'Montserrat',sans-serif;background:#f8f8f8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
    .fb-card{background:#fff;border-radius:.75rem;box-shadow:0 4px 24px rgba(34,41,47,.1);max-width:520px;width:100%;padding:2rem}
    .fb-card .logo{display:flex;align-items:center;gap:8px;margin-bottom:1.5rem}
    .fb-card .logo i{font-size:1.8rem;color:#7367f0}
    .fb-card .logo h3{font-weight:700;color:#7367f0;margin:0}
    .fb-card h5{font-weight:600;color:#5e5873}
    .fb-card .meta{font-size:.85rem;color:#b9b9c3;margin-bottom:1.5rem}
    .rating-group{margin-bottom:1.5rem}
    .rating-group label{font-weight:600;color:#5e5873;margin-bottom:.5rem;display:block;font-size:.9rem}
    .star-row{display:flex;gap:6px}
    .star-row .star-btn{width:44px;height:44px;border-radius:10px;border:2px solid #ebe9f1;background:#fff;color:#b9b9c3;font-size:1.1rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
    .star-row .star-btn:hover{border-color:#7367f0;color:#7367f0}
    .star-row .star-btn.active{background:#7367f0;border-color:#7367f0;color:#fff}
    .success-msg{text-align:center;padding:3rem 1rem}
    .success-msg i{font-size:4rem;color:#28c76f}
    .success-msg h4{font-weight:600;color:#5e5873;margin-top:1rem}
    </style>
</head>
<body>
<div class="fb-card">
    <div class="logo">
        <i class="bi bi-mortarboard-fill" style="font-size:1.8rem;color:#7367f0"></i>ОкууTrack
    </div>

    {% if submitted %}
    <div class="success-msg">
        <i class="bi bi-check-circle-fill"></i>
        <h4>Спасибо за ваш отзыв!</h4>
        <p class="text-muted">Ваш ответ был успешно отправлен.</p>
    </div>
    {% else %}
    <h5>Отзыв об уроке</h5>
    <div class="meta">
        <i class="bi bi-calendar3 me-1"></i>{{ lesson.lesson_date|date:"d.m.Y" }}
        {% if lesson.title %} — {{ lesson.title }}{% endif %}
        <br>
        <i class="bi bi-book-half me-1"></i>{{ course.title }}
    </div>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label fw-semibold" style="color:#5e5873">Ваше имя (необязательно)</label>
            <input type="text" name="student_name" class="form-control" placeholder="Введите имя">
        </div>

        <div class="rating-group">
            <label><i class="bi bi-person-check me-1" style="color:#7367f0"></i>Как вы оцениваете работу ментора?</label>
            <input type="hidden" name="mentor_rating" id="mentor_rating" value="0">
            <div class="star-row" data-target="mentor_rating">
                <button type="button" class="star-btn" data-value="1">1</button>
                <button type="button" class="star-btn" data-value="2">2</button>
                <button type="button" class="star-btn" data-value="3">3</button>
                <button type="button" class="star-btn" data-value="4">4</button>
                <button type="button" class="star-btn" data-value="5">5</button>
            </div>
        </div>

        <div class="rating-group">
            <label><i class="bi bi-lightning-charge me-1" style="color:#28c76f"></i>Как вы оцениваете свою активность?</label>
            <input type="hidden" name="self_activity" id="self_activity" value="0">
            <div class="star-row" data-target="self_activity">
                <button type="button" class="star-btn" data-value="1">1</button>
                <button type="button" class="star-btn" data-value="2">2</button>
                <button type="button" class="star-btn" data-value="3">3</button>
                <button type="button" class="star-btn" data-value="4">4</button>
                <button type="button" class="star-btn" data-value="5">5</button>
            </div>
        </div>

        <div class="rating-group">
            <label><i class="bi bi-emoji-smile me-1" style="color:#ff9f43"></i>Ваше настроение на уроке?</label>
            <input type="hidden" name="mood" id="mood" value="0">
            <div class="star-row" data-target="mood">
                <button type="button" class="star-btn" data-value="1">1</button>
                <button type="button" class="star-btn" data-value="2">2</button>
                <button type="button" class="star-btn" data-value="3">3</button>
                <button type="button" class="star-btn" data-value="4">4</button>
                <button type="button" class="star-btn" data-value="5">5</button>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-semibold" style="color:#5e5873">Комментарий (необязательно)</label>
            <textarea name="comment" class="form-control" rows="3" placeholder="Ваши пожелания или замечания..."></textarea>
        </div>

        <button type="submit" class="btn w-100 text-white" id="submitBtn" style="background:linear-gradient(118deg,#7367f0,rgba(115,103,240,.7));border:none;padding:.75rem" disabled>
            <i class="bi bi-send me-1"></i>Отправить отзыв
        </button>
    </form>
    {% endif %}
</div>

<script>
document.querySelectorAll('.star-row').forEach(row => {
    const target = row.dataset.target;
    const hidden = document.getElementById(target);
    row.querySelectorAll('.star-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const val = parseInt(btn.dataset.value);
            hidden.value = val;
            row.querySelectorAll('.star-btn').forEach(b => {
                b.classList.toggle('active', parseInt(b.dataset.value) <= val);
            });
            checkReady();
        });
    });
});
function checkReady(){
    const m = parseInt(document.getElementById('mentor_rating').value);
    const a = parseInt(document.getElementById('self_activity').value);
    const d = parseInt(document.getElementById('mood').value);
    document.getElementById('submitBtn').disabled = !(m>0 && a>0 && d>0);
}
</script>
</body>
</html>
