{% extends "base/course_base.html" %}
{% block title %}{{ page_title }}{% endblock %}
{% block content %}
<div class="page-header">
    <div class="d-flex align-items-center gap-2">
        <a href="{% url 'lessons:calendar' course_id=course.pk %}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
        <h4 class="page-title mb-0">{{ page_title }}</h4>
    </div>
</div>
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card"><div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="row g-3">
                    {% for field in form %}
                    <div class="col-md-{% if field.name in 'title,description' %}12{% else %}6{% endif %}">
                        <label class="form-label fw-medium">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
                    </div>
                    {% endfor %}
                </div>
                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Сохранить</button>
                    <a href="{% url 'lessons:calendar' course_id=course.pk %}" class="btn btn-outline-secondary">Отмена</a>
                </div>
            </form>
        </div></div>
    </div>
</div>
{% endblock %}
