<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спасибо! - {{ form.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .success-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 50px 40px;
            max-width: 600px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .success-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #198754 0%, #20c997 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: scaleIn 0.5s ease-out;
        }
        
        @keyframes scaleIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .success-icon i {
            color: white;
            font-size: 40px;
        }
        
        .success-title {
            color: #333;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .success-message {
            color: #666;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .success-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn-action {
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-outline {
            background: transparent;
            color: #667eea;
            border-color: #667eea;
        }
        
        .btn-outline:hover {
            background: #667eea;
            color: white;
        }
        
        .duplicate-notice {
            background: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            border: 1px solid #ffeeba;
        }
        
        .channel-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
        }
        
        .channel-info h6 {
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .channel-info p {
            color: #666;
            margin: 0;
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .success-container {
                margin: 20px;
                padding: 40px 20px;
            }
            
            .success-title {
                font-size: 28px;
            }
            
            .success-message {
                font-size: 16px;
            }
            
            .success-actions {
                flex-direction: column;
            }
            
            .btn-action {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">
            <i class="bi bi-check-lg"></i>
        </div>
        
        <h1 class="success-title">Спасибо!</h1>
        
        {% if is_duplicate %}
        <div class="duplicate-notice">
            <i class="bi bi-info-circle me-2"></i>
            Мы заметили, что вы уже оставляли заявку. Мы свяжемся с вами в ближайшее время!
        </div>
        {% endif %}
        
        <div class="success-message">
            {{ form.success_text|safe }}
        </div>
        
        <div class="success-actions">
            <a href="#" onclick="window.close();" class="btn-action btn-outline">
                <i class="bi bi-x-lg me-2"></i>Закрыть
            </a>
            <a href="{{ form.get_absolute_url }}" class="btn-action btn-primary">
                <i class="bi bi-arrow-clockwise me-2"></i>Новая заявка
            </a>
        </div>
        
        <div class="channel-info">
            <h6>Информация о заявке</h6>
            <p>
                <strong>Источник:</strong> {{ form.get_channel_display }}<br>
                <strong>Форма:</strong> {{ form.title }}<br>
                <strong>Время:</strong> {% now "d.m.Y H:i" %}
            </p>
        </div>
    </div>

    <script>
        // Автоматическое закрытие через 10 секунд
        setTimeout(function() {
            if (window.opener) {
                window.close();
            }
        }, 10000);
        
        // Отправка сообщения в родительское окно (если есть)
        if (window.opener) {
            window.opener.postMessage({
                type: 'form_submitted',
                formId: '{{ form.pk }}',
                isDuplicate: {{ is_duplicate|yesno:'true,false' }}
            }, '*');
        }
        
        // Аналитика (если нужно)
        if (typeof gtag !== 'undefined') {
            gtag('event', 'form_submit', {
                'form_name': '{{ form.title }}',
                'form_channel': '{{ form.get_channel_display }}',
                'is_duplicate': {{ is_duplicate|yesno:'true,false' }}
            });
        }
    </script>
</body>
</html>
